description = Glob patters are a way malicious actors can evade detection. This analytic will review PowerShell and CMD execution to see if this is occurring. By checking for the use of Get-Command or Get-Alias and their respective aliases, tied with and wild card that is valid for these shells we can alert on the activity. This alert has NOT been tested extensively.\
