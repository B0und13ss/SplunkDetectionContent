action.notable.param.drilldown_searches = [{"disabled":false,"earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$","name":"View Detection Results","search":"| tstats `security_content_summariesonly` count min(_time) AS firstTime max(_time) AS lastTime FROM datamodel=sigma_windows.process_creation WHERE process_creation.Image IN (\"*powershell.exe\" \"*cmd.exe\") BY process_creation.ParentImage process_creation.ParentCommandLine process_creation.CommandLine process_creation.User process_creation.dest_name \n| `drop_dm_object_name(process_creation)` \n| rename CommandLine AS CommandLine_ScriptBlockText\n| eval vendor_product=\"Microsoft Sysmon\"\n| append \n    [| tstats `security_content_summariesonly` count min(_time) AS firstTime max(_time) AS lastTime FROM datamodel=sigma_windows.ps_script BY ps_script.ScriptBlockText ps_script.dest_name \n    | `drop_dm_object_name(ps_script)` \n    | rename ScriptBlockText AS CommandLine_ScriptBlockText\n    | eval vendor_product=\"Microsoft PowerShell\"\n        ] \n| regex CommandLine_ScriptBlockText=\"(\\(gcm|gal|Get-Command|Get-Alias|get-command|get-alias|where|dir)(.*[\\*\\?\\[\\]\\{\\}].*\\))\"\n| `security_content_ctime(firstTime)` \n| `security_content_ctime(lastTime)`\n| eval User=if(isnotnull(User), User, \"unknown\")\n| table dest_name User CommandLine_ScriptBlockText firstTime lastTime vendor_product count\n| `lolglob_execution_with_powerShell_or_cmd_filter`\n| search dest_name=\"$dest_name$\" User=\"$user$\""}]
action.notable.param.investigation_type = default
action.notable.param.rule_description = Glob patters are a way malicious actors can evade detection. This analytic will review PowerShell and CMD execution to see if this is occurring. By checking for the use of Get-Command or Get-Alias and their respective aliases, tied with and wild card that is valid for these shells we can alert on the activity. This alert has NOT been tested extensively.\
